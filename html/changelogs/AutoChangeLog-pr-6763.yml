author: "Ollanius"
delete-after: True
changes:
  - rscadd: "Replaces the placeholder text in the 'Azurian' origin with something properly sourced from the wiki and community."
  - rscadd: "Touches up the 'Nowhere' option with a little more fluff."
  - rscadd: "Adds more commonly-found words and concepts to the Primer."
  - bugfix: "Mentions of 'Vanderlin' in the code have been appropriately adjusted to the more agnostic term of 'Daftmarsh'."
  - bugfix: "Slightly agnostifies(?) Rudmarsch's maiden name into the 'Sanguine Reach', and the Rotwood Vale into the Rotwoad Vale."
  - bugfix: "Modifies 'Lyndvhar' mention to 'Zyndhardia', at request."
  - rscadd: "Adds 'Lakkari' to the Primer, to avoid any potential confusion regarding some descriptions. Similar to Monkberry's Naledi, this entry has also been co-authored and approved by its original creator, 7erracotta."
  - rscdel: "Mentions of Blackstone - from the Primer - have been fittingly nuked out of existence."
  - rscdel: "Rotwood, likewise, has been left to rot."