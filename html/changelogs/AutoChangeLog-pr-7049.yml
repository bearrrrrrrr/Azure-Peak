author: "radarseas"
delete-after: True
changes:
  - rscadd: "Added dchat goblin slot examinations."
  - rscadd: "Added goblin name picking."
  - rscadd: "Added goblin player friendly examinations, between goblins."
  - balance: "Goblin + Dreamwalker portals now glow."
  - balance: "Goblin Portals have slightly more integrity to make them a little harder to close. 200 -> 400, bring an axe to shutdown goblin portals, or explosives. You can still break them through brute force by bringing several people along."
  - balance: "Most invasions/raid omens are far deadlier than before."
  - balance: "Siege skeletons now pick from 3 custom classes, they are terrible and designed to die horribly but you get to aurafarm and do shennagions expendably over and over before the raids simmer down."
  - balance: "Necromancer skeletons are no longer critically weak."
  - balance: "Goblin player slots have been seperated from portal NPC slots."
  - balance: "Goblin portals now summon 3 goblins + 5 players below 30 pop, they summon up to 6 goblins and 10 players above 30 pop."
  - bugfix: "Portal goblins now have the correct music + patron."
  - bugfix: "Siege skeletons are less buggy, have names and properly should always skeletonise like wretch-skeles guarrenting they get their proper traits."
  - code_imp: "Redone seige code, expect different skeleton kinds for seiges."
  - admin: "Goblins from portals/seiges now have an antag datum, it draws no cost from storyteller."
  - server: "Seige skeles added to defines."