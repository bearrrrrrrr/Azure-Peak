author: "Ollanius"
delete-after: True
changes:
  - rscadd: "Adds the Toga, a new tabard that's both dyeable and adjustable (via RMB) to partly expose the chest."
  - rscadd: "The Lordly Cloak, DIrebear Cloak, Blue Direbear Cloak, Wicker Cloak, Stalker Cloak, Stoles, and Golden/Silver Order Cloaks can now be worn by shorter races - courtesy of Yuyup's spritework."
  - rscadd: "Adds the Blessed Robe, Blessed Tabard, and Blessed Hood; black variants of their Inquisitorial counterparts, intended to be worn by those who aren't directly affiliated (in some way) to the Inquisition."
  - rscadd: "Adds the Silver Order Cloak, for those who adore a different hue."
  - balance: "Faction-unique tabards and garb are now Expert-tier crafting recipes, instead of Journeyman-tier."
  - balance: "All Psydonic Cleric subclasses, alongside the Heretic, now receive non-Inquisitorial versions of their clothing. The Heretic Spy and Otavan Repentant, owing to their direct connection to the Inquisition, retain what they currently get. Cantors and Missionaries in particular get the Blessed Robe instead of the Blessed Tabard."
  - code_imp: "Decapitalizes a few errant item names, and touches up the names of amulets in the Devotee-virtued tab."